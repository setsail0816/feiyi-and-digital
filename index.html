<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗数创跨境交易平台 | Intangible Cultural Heritage Digital Trading Platform</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", "Microsoft YaHei", sans-serif;
            transition: all 0.3s ease;
        }

        /* 国际化主题色：深蓝+白色+浅灰 */
        :root {
            --primary-dark: #0a3d62;
            --primary-light: #2d5c8a;
            --primary-hover: #1e6bb8;
            --white: #ffffff;
            --gray-light: #f8f9fa;
            --gray-medium: #e9ecef;
            --text-dark: #212529;
            --text-gray: #6c757d;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            background-color: var(--gray-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* 容器限制 - 国际化布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 - 国际化风格 */
        nav {
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 16px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 999;
            box-shadow: var(--shadow-sm);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo-en {
            font-size: 18px;
            opacity: 0.9;
        }

        .nav-content {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 15px;
            opacity: 0.9;
            position: relative;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--white);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 语言切换按钮 */
        .lang-switch {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background-color: rgba(255,255,255,0.15);
            color: var(--white);
            cursor: pointer;
            font-size: 14px;
        }

        .lang-btn.active {
            background-color: var(--white);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .lang-btn:hover {
            background-color: rgba(255,255,255,0.25);
        }

        /* 头部横幅 - 国际化视觉 */
        .banner {
            margin-top: 72px;
            height: 550px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: var(--white);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .banner::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://s41.ax1x.com/2026/03/16/peVW91g.md.jpg ") center/cover no-repeat;
            opacity: 0.1;
            z-index: 1;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            max-width: 650px;
            padding: 0 0 0 8%;
        }

        .banner h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .banner p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 32px;
            opacity: 0.95;
        }

        .btn-primary {
            background-color: var(--white);
            color: var(--primary-dark);
            padding: 14px 36px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            display: inline-block;
            box-shadow: var(--shadow-sm);
            border: 2px solid var(--white);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--white);
        }

        /* 板块通用样式 */
        .section {
            padding: 100px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            color: var(--primary-dark);
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .section-subtitle {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* 平台介绍 */
        .about {
            background-color: var(--white);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .about-text {
            font-size: 17px;
            line-height: 1.9;
            color: var(--text-dark);
        }

        .about-text p {
            margin-bottom: 20px;
        }

        .about-img {
            width: 100%;
            height: 400px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .about-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 核心优势 */
        .features {
            background-color: var(--gray-light);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .feature-card {
            background-color: var(--white);
            padding: 32px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
        }

        .feature-icon {
            width: 70px;
            height: 70px;
            background-color: rgba(10, 61, 98, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--primary-dark);
            font-size: 28px;
        }

        .feature-card h3 {
            color: var(--primary-dark);
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .feature-card p {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.7;
        }

        /* 商品展示 - 国际化升级 */
        .products {
            background-color: var(--white);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
        }

        .product-img {
            width: 100%;
            height: 220px;
            overflow: hidden;
            cursor: pointer; /* 鼠标悬停显示手型 */
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 24px;
        }

        .product-tag-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .product-tag {
            background-color: rgba(10, 61, 98, 0.1);
            color: var(--primary-dark);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .product-price {
            color: #d32f2f;
            font-weight: 700;
            font-size: 18px;
        }

        .product-title {
            font-size: 17px;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 600;
            line-height: 1.4;
        }

        .product-desc {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .product-region {
            font-size: 12px;
            color: var(--primary-light);
            font-weight: 500;
        }

        /* 团队介绍 */
        .team {
            background-color: var(--gray-light);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
        }

        .team-card {
            text-align: center;
            background-color: var(--white);
            padding: 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .team-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--primary-light);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 32px;
        }

        .team-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .team-role {
            font-size: 13px;
            color: var(--text-gray);
        }

        /* 页脚 - 国际化样式 */
        footer {
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 60px 0 30px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-brand {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .footer-desc {
            font-size: 14px;
            line-height: 1.8;
            opacity: 0.8;
            max-width: 400px;
        }

        .footer-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }

        .footer-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            opacity: 0.7;
        }

        /* 移动端适配 */
        @media (max-width: 992px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .team-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .footer-content {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .banner h1 {
                font-size: 36px;
            }
            .about-content {
                grid-template-columns: 1fr;
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .team-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .footer-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .team-grid {
                grid-template-columns: 1fr;
            }
            .banner {
                height: 450px;
            }
            .banner h1 {
                font-size: 28px;
            }
            .section {
                padding: 60px 0;
            }
        }

        /* 隐藏元素样式 */
        .hide {
            display: none !important;
        }

        /* 完善中页面样式 */
        .under-construction {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--gray-light);
            padding: 20px;
            text-align: center;
        }

        .construction-icon {
            font-size: 80px;
            color: var(--primary-dark);
            margin-bottom: 30px;
        }

        .construction-title {
            font-size: 36px;
            color: var(--primary-dark);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .construction-desc {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .back-btn {
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 12px 30px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>

    <!-- 核心功能脚本 -->
    <script>
        // 打开完善中页面的统一函数
        function openConstructionPage() {
            // 获取当前语言状态
            const lang = document.documentElement.lang || 'zh-CN';
            // 在当前窗口打开（替代新窗口，解决返回问题）
            window.location.href = `${localStorage.getItem('mainPageUrl')}?construction=true&lang=${lang}`;
        }

        // 仅在主页面执行语言切换逻辑
        if (!isUnderConstruction) {
            // 获取语言切换按钮
            const cnBtn = document.getElementById('cnBtn');
            const enBtn = document.getElementById('enBtn');
            
            // 获取所有中英文元素
            const cnElements = document.querySelectorAll('.cn');
            const enElements = document.querySelectorAll('.en');
            
            // 中文切换
            cnBtn.addEventListener('click', function() {
                cnBtn.classList.add('active');
                enBtn.classList.remove('active');
                cnElements.forEach(el => el.classList.remove('hide'));
                enElements.forEach(el => el.classList.add('hide'));
                document.documentElement.lang = 'zh-CN';
                // 更新本地存储的语言状态
                localStorage.setItem('currentLang', 'zh-CN');
            });
            
            // 英文切换
            enBtn.addEventListener('click', function() {
                enBtn.classList.add('active');
                cnBtn.classList.remove('active');
                enElements.forEach(el => el.classList.remove('hide'));
                cnElements.forEach(el => el.classList.add('hide'));
                document.documentElement.lang = 'en';
                // 更新本地存储的语言状态
                localStorage.setItem('currentLang', 'en');
            });
            
            // 页面滚动平滑效果
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });

            // 初始化语言状态
            const savedLang = localStorage.getItem('currentLang') || 'zh-CN';
            if (savedLang === 'en') {
                enBtn.click();
            } else {
                cnBtn.click();
            }
        } else {
            // 在完善中页面执行逻辑
            // 获取语言参数
            const lang = urlParams.get('lang') || 'zh-CN';
            document.documentElement.lang = lang;
            
            // 切换多语言显示
            const cnElements = document.querySelectorAll('.cn');
            const enElements = document.querySelectorAll('.en');
            
            if (lang === 'en') {
                cnElements.forEach(el => el.classList.add('hide'));
                enElements.forEach(el => el.classList.remove('hide'));
            } else {
                enElements.forEach(el => el.classList.add('hide'));
                cnElements.forEach(el => el.classList.remove('hide'));
            }
            
            // 修复返回按钮功能（核心修复）
            document.getElementById('backToMainBtn').addEventListener('click', function() {
                // 回到主页面并保留语言状态
                window.location.href = `${localStorage.getItem('mainPageUrl')}?lang=${lang}#products`;
            });
        }
    </script>
